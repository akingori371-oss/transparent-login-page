<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login page</title>
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <link rel="stylesheet" href="index.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="flex justify-end items-center pr-16">
    <main class="w-120 flex flex-col justify-end p-3 border-3 border-red-400 rounded-3xl text-white bg-black/15 backdrop-blur-md hover:shadow-[0_0_30px_red] duration-200">
        <h2 class="border-b border-indigo-500 pb-2  flex items-center justify-center font-bold text-3xl mb-5 family-[poppins] hover:text-red-400 duration-400">Sign in</h2>
        <section class="flex flex-col space-4 m-5" id="inputs">
            <input type="text" name="" id="username" placeholder="Username" class="border-3 border-purple-400 transition-transform rounded-3xl p-3 m-3 hover:border-red-300 hover:-translate-y-1.5 duration-400">
            <input type="email" name="" id="email" placeholder="email" class="border-3 border-purple-400 transition-transform rounded-3xl p-3 m-3 hover:border-red-300 duration-200 hover:-translate-y-1.5 duration-400">
              <input type="text" name="" id="username" placeholder="password" class="border-3 border-purple-400 transition-transform rounded-3xl p-3 m-3 hover:border-red-300 hover:-translate-y-1.5 duration-400">
            </section>
            <section class="flex flex-row justify-between">
           <label class="flex items-center gap-2 transition-transform hover:text-red-400 duration-200 hover:translate-x-1">
    <input type="checkbox" class="cursor-pointer">
    <span>Remember me</span>
</label>
            <a href="" class="hover:text-red-400 duration-400 transition-transform hover:-translate-x-1">Forgot password!</a>
            </section>
            <section class="w-full flex items-center justify-center mt-5 mb-2">
            <button class="flex items-center justify-center bg-blue-600 border text-white py-1 px-6 rounded-xl shadow-[0px_0px_20px_white]  hover:text-xl hover:opacity-60 transition-all duration-200 hover:bg-white hover:text-red-300 duration-200">Login
</button>
            </section>
            <p class="flex items-center justify-center">Don't have an account? <a href="" class="text-sky-300">Register</a></p>
            
        </section>
            </main>
</body>
</html>
